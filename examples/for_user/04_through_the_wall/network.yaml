# Example 4: Through the Wall
#
# Two nodes in separate concrete rooms. Sionna's ray tracer finds the propagation
# path through the doorway — no direct line of sight through the wall.
#
# Scene: scenes/two_rooms.xml
#   Two 20m x 40m rooms separated by a concrete wall at x=20m
#   1.3m wide x 2m high doorway at y=20m (center of dividing wall)
#
# Room layout:
#
#   y=40 ─────────────────────────────────────────
#        │           Room 1       │    Room 2      │
#   y=20 │                       (doorway 1.3m wide)
#        │    node1 (10,10,1)    │  node2 (30,10,1)│
#   y=0  ─────────────────────────────────────────
#        x=0          x=10    x=20    x=30      x=40
#                        wall at x=20
#
# Both nodes are south of the doorway (y=10), so signal must travel
# through wall or take the long path via the doorway opening.
# Sionna RT finds the shortest valid propagation path.
#
# Expected behavior:
# - Wall attenuation drops SNR ~15-20 dB vs free space at same distance
# - Sionna selects a more robust MCS (e.g., MCS 4-7 instead of MCS 10)
# - Link remains usable — NLOS degrades quality, doesn't kill it
#
# Compare with Example 3 (free space at 20m, MCS 10 ~480 Mbps):
# - This example (NLOS through rooms): MCS ~4-7, ~100-300 Mbps

name: through-the-wall-04

topology:
  enable_sinr: false

  scene:
    file: scenes/two_rooms.xml

  nodes:
    node1:
      kind: linux
      image: alpine:latest
      exec:
        - apk add --no-cache iproute2 iputils iperf3
      interfaces:
        eth1:
          ip_address: 10.0.0.1/24
          wireless:
            position:
              x: 10.0    # Room 1 (west room)
              y: 10.0    # South side (doorway is at y=20)
              z: 1.0
            frequency_ghz: 5.18
            bandwidth_mhz: 80
            rf_power_dbm: 20.0
            rx_sensitivity_dbm: -80.0
            antenna_pattern: hw_dipole
            polarization: V
            mcs_table: examples/common_data/wifi6_mcs.csv
            mcs_hysteresis_db: 2.0

    node2:
      kind: linux
      image: alpine:latest
      exec:
        - apk add --no-cache iproute2 iputils iperf3
      interfaces:
        eth1:
          ip_address: 10.0.0.2/24
          wireless:
            position:
              x: 30.0    # Room 2 (east room)
              y: 10.0    # South side (doorway is at y=20)
              z: 1.0
            frequency_ghz: 5.18
            bandwidth_mhz: 80
            rf_power_dbm: 20.0
            rx_sensitivity_dbm: -80.0
            antenna_pattern: hw_dipole
            polarization: V
            mcs_table: examples/common_data/wifi6_mcs.csv
            mcs_hysteresis_db: 2.0

  links:
    - endpoints: [node1:eth1, node2:eth1]
