# Example 2: Co-Channel Interference
#
# Same three nodes as Example 1 — same positions, same hardware, same frequency.
# The only change: enable_sinr: true.
#
# Topology:
#   node1 (0, 0, 1) ------- 30m ------- node2 (30, 0, 1)
#           \                                  /
#          91.2m                           91.2m
#                \                        /
#                  node3 (15, 90, 1)
#
# With co-channel interference:
# - node1↔node2 (30m):   SINR ≈ 9-10 dB → MCS 1 (QPSK) → ~50 Mbps
# - node1↔node3 (91.2m): SINR ≈ -3 dB  → 100% loss → 0 Mbps (DEAD)
# - node2↔node3 (91.2m): SINR ≈ -3 dB  → 100% loss → 0 Mbps (DEAD)
#
# Why: On the long links (91.2m), the desired signal is weaker than the
# interference from the nearby node. Physics, not configuration, kills the link.

name: co-channel-interference-02

topology:
  enable_sinr: true  # Enable co-channel interference modeling

  scene:
    file: scenes/vacuum.xml

  shared_bridge:
    enabled: true
    name: mesh-02-br0
    nodes: [node1, node2, node3]

  nodes:
    node1:
      kind: linux
      image: alpine:latest
      exec:
        - apk add --no-cache iproute2 iputils iperf3
      interfaces:
        eth1:
          ip_address: 192.168.100.1/24
          wireless:
            position:
              x: 0
              y: 0
              z: 1
            frequency_ghz: 5.18
            bandwidth_mhz: 80
            rf_power_dbm: 20.0
            rx_sensitivity_dbm: -80.0
            antenna_pattern: hw_dipole
            polarization: V
            mcs_table: examples/common_data/wifi6_mcs.csv
            mcs_hysteresis_db: 2.0

    node2:
      kind: linux
      image: alpine:latest
      exec:
        - apk add --no-cache iproute2 iputils iperf3
      interfaces:
        eth1:
          ip_address: 192.168.100.2/24
          wireless:
            position:
              x: 30
              y: 0
              z: 1
            frequency_ghz: 5.18
            bandwidth_mhz: 80
            rf_power_dbm: 20.0
            rx_sensitivity_dbm: -80.0
            antenna_pattern: hw_dipole
            polarization: V
            mcs_table: examples/common_data/wifi6_mcs.csv
            mcs_hysteresis_db: 2.0

    node3:
      kind: linux
      image: alpine:latest
      exec:
        - apk add --no-cache iproute2 iputils iperf3
      interfaces:
        eth1:
          ip_address: 192.168.100.3/24
          wireless:
            position:
              x: 15
              y: 90
              z: 1
            frequency_ghz: 5.18
            bandwidth_mhz: 80
            rf_power_dbm: 20.0
            rx_sensitivity_dbm: -80.0
            antenna_pattern: hw_dipole
            polarization: V
            mcs_table: examples/common_data/wifi6_mcs.csv
            mcs_hysteresis_db: 2.0
