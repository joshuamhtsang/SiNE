# Example 3: Adaptive WiFi Link
#
# A point-to-point WiFi 6 link with automatic rate adaptation.
# Sionna computes SNR from geometry; the MCS table selects the best
# modulation automatically.
#
# Nodes:
# - node1 (AP):     (0, 0, 2.5) — ceiling-mounted access point
# - node2 (client): (20, 0, 1.0) — desk-height client
#
# At 20m in free space (5.18 GHz, 80 MHz, hw_dipole, 20 dBm):
# - Distance: ~20m
# - SNR: ~36 dB
# - Selected MCS: 10 (1024-QAM 3/4) → ~480 Mbps
#
# Try changing node2's x position to see MCS adapt:
# - 20m → SNR ~36 dB → MCS 10 (~480 Mbps)
# - 50m → SNR ~28 dB → MCS 8  (~340 Mbps)
# - 100m → SNR ~22 dB → MCS 6  (~192 Mbps)
# - 200m → SNR ~16 dB → MCS 4  (~96 Mbps)

name: adaptive-wifi-link-03

topology:
  enable_sinr: false

  scene:
    file: scenes/vacuum.xml

  nodes:
    node1:
      kind: linux
      image: alpine:latest
      exec:
        - apk add --no-cache iproute2 iputils iperf3
      interfaces:
        eth1:
          ip_address: 192.168.1.1/24
          wireless:
            position:
              x: 0
              y: 0
              z: 2.5        # Ceiling height (AP)
            frequency_ghz: 5.18
            bandwidth_mhz: 80
            rf_power_dbm: 20.0
            rx_sensitivity_dbm: -80.0
            antenna_pattern: hw_dipole
            polarization: V
            mcs_table: examples/common_data/wifi6_mcs.csv
            mcs_hysteresis_db: 2.0

    node2:
      kind: linux
      image: alpine:latest
      exec:
        - apk add --no-cache iproute2 iputils iperf3
      interfaces:
        eth1:
          ip_address: 192.168.1.2/24
          wireless:
            position:
              x: 20         # Change this to vary distance and observe MCS selection
              y: 0
              z: 1.0        # Desk height (client)
            frequency_ghz: 5.18
            bandwidth_mhz: 80
            rf_power_dbm: 20.0
            rx_sensitivity_dbm: -80.0
            antenna_pattern: hw_dipole
            polarization: V
            mcs_table: examples/common_data/wifi6_mcs.csv
            mcs_hysteresis_db: 2.0

  links:
    - endpoints: [node1:eth1, node2:eth1]
